<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Flappy Bird v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#1a0533;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;}
#wrap{position:relative;}
canvas{display:block;touch-action:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
@keyframes pop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes floatIn{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* ── LOBBY ── */
#lobby{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:inherit;overflow:hidden;}
#lobby.hidden{display:none;}
.lobby-bg{position:absolute;inset:0;background:linear-gradient(170deg,rgba(10,3,30,0.93) 0%,rgba(20,5,50,0.93) 100%);}
#lobby>*:not(.lobby-bg){position:relative;z-index:1;}
.ttl{font-family:'Fredoka One',cursive;font-size:clamp(28px,9vw,42px);color:#ffe94a;text-shadow:0 4px 0 #b45309, 0 0 30px #ffb30088;text-align:center;line-height:1.1;letter-spacing:1px;animation:pulse 2s infinite;}
.ttl span{color:#ff6b35;text-shadow:0 4px 0 #9a1c0c, 0 0 30px #ff6b3588;}
.lbl{font-family:'Nunito',sans-serif;font-size:10px;color:#c4b5fd99;letter-spacing:2px;text-align:center;text-transform:uppercase;}
input{background:rgba(255,255,255,0.06);border:2px solid rgba(124,58,237,0.4);color:#fff;padding:10px 16px;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;width:100%;max-width:280px;letter-spacing:2px;text-align:center;outline:none;transition:border 0.2s;}
input:focus{border-color:#a78bfa;}
input::placeholder{color:#ffffff25;}
.btn{pointer-events:all;border:none;color:white;padding:13px 0;font-family:'Fredoka One',cursive;font-size:15px;letter-spacing:1px;border-radius:14px;cursor:pointer;width:100%;max-width:280px;-webkit-appearance:none;transition:transform 0.1s,filter 0.1s;position:relative;}
.btn:active{transform:scale(0.96);}
.btn-play{background:linear-gradient(135deg,#ff6b35,#ef4444);box-shadow:0 5px 0 #9a1c0c,0 0 30px #ff6b3544;}
.btn-multi{background:linear-gradient(135deg,#7c3aed,#4f46e5);box-shadow:0 5px 0 #2e1065,0 0 30px #7c3aed44;}
.btn-join-small{pointer-events:all;border:none;color:white;padding:10px 18px;font-family:'Fredoka One',cursive;font-size:14px;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#4f46e5);box-shadow:0 4px 0 #2e1065;white-space:nowrap;-webkit-appearance:none;}
.divider{font-family:'Nunito',sans-serif;color:#ffffff18;font-size:11px;letter-spacing:3px;width:100%;max-width:280px;text-align:center;display:flex;align-items:center;gap:8px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}
#status{font-family:'Nunito',sans-serif;font-size:11px;color:#86efac;text-align:center;min-height:18px;letter-spacing:1px;animation:blink 1.2s infinite;}
#code-box{background:rgba(124,58,237,0.18);border:2px solid #7c3aed66;border-radius:14px;padding:14px 24px;text-align:center;animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
#code-val{font-family:'Fredoka One',cursive;font-size:clamp(24px,8vw,34px);color:#c4b5fd;letter-spacing:8px;}
#code-hint{font-family:'Nunito',sans-serif;font-size:10px;color:#ffffff44;margin-top:4px;letter-spacing:1px;}
.row-inp{display:flex;gap:8px;align-items:center;width:100%;max-width:280px;}

/* ── HUD ── */
#hud{position:absolute;inset:0;pointer-events:none;display:none;}
#slv{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-family:'Fredoka One',cursive;font-size:clamp(30px,9vw,44px);color:#fff;text-shadow:0 3px 0 rgba(0,0,0,0.4),0 0 20px #ffe94a99;white-space:nowrap;}
#p2hud{position:absolute;top:16px;right:12px;text-align:right;font-family:'Nunito',sans-serif;font-size:clamp(10px,2.8vw,12px);color:#c4b5fd;text-shadow:0 0 10px #7c3aedaa;line-height:1.6;}
#ready_msg{position:absolute;bottom:34%;left:0;right:0;text-align:center;font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,18px);color:#ffe94a;text-shadow:0 2px 0 #b45309,0 0 14px #ffb300cc;letter-spacing:2px;animation:blink 0.8s infinite;display:none;}
.combo-pop{position:absolute;font-family:'Fredoka One',cursive;font-size:clamp(16px,5vw,22px);color:#ff6b35;text-shadow:0 2px 0 #9a1c0c;pointer-events:none;animation:floatIn 0.3s ease,blink 0.5s 0.3s forwards;left:50%;transform:translateX(-50%);}

/* ── GAME OVER ── */
#goscreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(5,2,15,0.88);border-radius:inherit;}
#goscreen.show{display:flex;animation:floatIn 0.3s ease;}
.go-ttl{font-family:'Fredoka One',cursive;font-size:clamp(26px,8vw,36px);color:#ef4444;text-shadow:0 4px 0 #7f1d1d,0 0 24px #ef444488;animation:shake 0.4s ease;}
.go-sc{font-family:'Fredoka One',cursive;font-size:clamp(20px,6vw,28px);color:#ffe94a;text-shadow:0 3px 0 #b45309;}
.go-best{font-family:'Nunito',sans-serif;font-size:clamp(12px,3vw,14px);color:#fb923c;font-weight:700;}
.go-p2{font-family:'Nunito',sans-serif;font-size:clamp(11px,2.8vw,13px);color:#a78bfa;font-weight:700;}
.go-medal{font-size:clamp(30px,9vw,44px);animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ver" style="position:absolute;top:8px;left:10px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,0.2);letter-spacing:2px;pointer-events:none;z-index:99;">v3</div>

  <div id="hud">
    <div id="slv">0</div>
    <div id="p2hud"></div>
    <div id="ready_msg">TOUCHE POUR VOLER !</div>
  </div>

  <div id="goscreen">
    <div class="go-medal" id="go-medal">🥇</div>
    <div class="go-ttl">GAME OVER</div>
    <div class="go-sc" id="go-sc"></div>
    <div class="go-best" id="go-best"></div>
    <div class="go-p2" id="go-p2"></div>
    <button class="btn btn-play" id="go-btn" style="max-width:220px;margin-top:8px;">▶ REJOUER</button>
    <button class="btn" id="go-menu" style="max-width:220px;background:rgba(255,255,255,0.08);box-shadow:0 4px 0 rgba(0,0,0,0.3);">🏠 MENU</button>
  </div>

  <div id="lobby">
    <div class="lobby-bg"></div>
    <div class="ttl">🐦 FLAPPY<br><span>BIRD</span></div>
    <div class="lbl">TON NOM</div>
    <input id="inp-name" placeholder="Joueur 1" maxlength="12" autocomplete="off" spellcheck="false"/>
    <button class="btn btn-play" id="btn-solo">▶ JOUER EN SOLO</button>

    <div class="divider">MULTIJOUEUR</div>
    <button class="btn btn-multi" id="btn-create">🎮 CRÉER UNE PARTIE</button>
    <div class="row-inp">
      <input id="inp-code" placeholder="CODE" maxlength="6" style="letter-spacing:4px;text-transform:uppercase;" autocomplete="off" spellcheck="false"/>
      <button class="btn-join-small" id="btn-join">REJOINDRE</button>
    </div>
    <div id="code-box" style="display:none;">
      <div id="code-val"></div>
      <div id="code-hint">Partage ce code à ton ami 👆</div>
    </div>
    <div id="status"></div>
  </div>
</div>

<script>
(function(){
'use strict';

// ══════════════════════════════════════════
//  DATA TRACKING — par joueur (UUID local)
// ══════════════════════════════════════════
const DATA_CFG = {
  BIN_ID:  '69adc700ae596e708f6da99b',
  API_KEY: '$2a$10$EQJ6piadmxMBMBuCGjJJMOwu3Bp5UzUNCbgfRTLwc3COjXUp6kZ36',
  enabled: true
};

// UUID persistant par appareil
function getUUID(){
  let id = localStorage.getItem('flappy_uuid');
  if(!id){ id = 'u-'+Date.now().toString(36)+Math.random().toString(36).substr(2,8); localStorage.setItem('flappy_uuid',id); }
  return id;
}

// Charge tous les joueurs depuis le bin
function loadPlayers(cb){
  fetch(`https://api.jsonbin.io/v3/b/${DATA_CFG.BIN_ID}/latest`,{
    headers:{'X-Master-Key':DATA_CFG.API_KEY}
  }).then(r=>r.json()).then(json=>{
    const data = Array.isArray(json.record) ? json.record : [];
    cb(data);
  }).catch(()=>cb([]));
}

// Sauvegarde tous les joueurs
function savePlayers(players, cb){
  fetch(`https://api.jsonbin.io/v3/b/${DATA_CFG.BIN_ID}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':DATA_CFG.API_KEY},
    body: JSON.stringify(players)
  }).then(()=>cb&&cb()).catch(()=>cb&&cb());
}

// Met à jour ou crée l'entrée du joueur courant
function trackSession(data){
  if(!DATA_CFG.enabled) return;
  const uuid = getUUID();
  const device = /Mobi/.test(navigator.userAgent)?'mobile':'desktop';
  loadPlayers(players=>{
    // Filtre l'entrée init
    const list = players.filter(p=>p.uuid);
    const idx = list.findIndex(p=>p.uuid===uuid);
    const now = new Date().toISOString();
    if(idx>=0){
      const p = list[idx];
      p.name = data.name;
      if(data.score > p.best_score) p.best_score = data.score;
      p.games_played = (p.games_played||0)+1;
      p.last_played = now;
      p.device = device;
    } else {
      list.push({
        uuid, name:data.name,
        best_score: data.score,
        games_played: 1,
        first_played: now,
        last_played: now,
        device
      });
    }
    savePlayers(list);
  });
}

// Charge et affiche le leaderboard
function loadLeaderboard(cb){
  loadPlayers(players=>{
    const list = players.filter(p=>p.uuid);
    list.sort((a,b)=>b.best_score-a.best_score);
    cb(list.slice(0,10));
  });
}

// ══════════════════════════════════════════
//  DOM
// ══════════════════════════════════════════
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');
const lobby=document.getElementById('lobby');
const hud=document.getElementById('hud');
const slv=document.getElementById('slv');
const p2hud=document.getElementById('p2hud');
const readyMsg=document.getElementById('ready_msg');
const goscreen=document.getElementById('goscreen');
const goMedal=document.getElementById('go-medal');
const goSc=document.getElementById('go-sc');
const goBest=document.getElementById('go-best');
const goP2=document.getElementById('go-p2');
const goBtn=document.getElementById('go-btn');
const goMenu=document.getElementById('go-menu');
const btnSolo=document.getElementById('btn-solo');
const btnCreate=document.getElementById('btn-create');
const btnJoin=document.getElementById('btn-join');
const inpName=document.getElementById('inp-name');
const inpCode=document.getElementById('inp-code');
const codeBox=document.getElementById('code-box');
const codeVal=document.getElementById('code-val');
const statusEl=document.getElementById('status');

// ══════════════════════════════════════════
//  SIZING
// ══════════════════════════════════════════
let W,H,GH,PW,PG,PS,GR,JP,SC;
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight,ratio=9/16;
  if(vw/vh<ratio){W=vw;H=Math.min(vh,vw/ratio);}else{H=vh;W=Math.min(vw,vh*ratio);}
  W=Math.floor(W);H=Math.floor(H);SC=W/360;
  GH=Math.round(22*SC);PW=Math.round(56*SC);
  PS=3.0*SC;GR=0.19*SC;JP=-5.0*SC;PG=Math.round(155*SC);
  canvas.width=W;canvas.height=H;
  wrap.style.width=W+'px';wrap.style.height=H+'px';
  canvas.style.borderRadius=Math.round(12*SC)+'px';
  canvas.style.boxShadow=`0 0 60px rgba(255,107,53,0.25),0 0 120px rgba(124,58,237,0.15)`;
}
resize();
window.addEventListener('resize',resize);

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let state='lobby';
let bird,ghost;
let pipes,score,best=0,frame=0,ptimer=0,goff=0;
let level=1,levelGoal=10,levelFlash=0,displayProgress=0;
let myName='Joueur 1',p2Name='Joueur 2';
let isSolo=true,isHost=false;
let peer=null,conn=null;
let seed=0,initSeed=0;
let sessionStart=0,pipesPassedCount=0;
let particles=[];
let screenShake=0;
let clouds=[];
let bgTrees=[];

function seededRand(){seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/0xffffffff;}

function resetBird(){bird={y:H/2,vy:0,rot:0,ff:0,squish:1,trail:[]};}
function resetGhost(){ghost={y:H/2,vy:0,rot:0,ff:0,alive:true,score:0};}

function initClouds(){
  clouds=Array.from({length:8},(_,i)=>({
    x:i*(W/7)+Math.random()*80,
    y:20+Math.random()*(H*0.38),
    scale:0.6+Math.random()*0.9,
    speed:(0.25+Math.random()*0.25)*SC,
    alpha:0.55+Math.random()*0.3,
    wobble:Math.random()*Math.PI*2,
    type:Math.floor(Math.random()*3) // 0=puffy 1=long 2=wispy
  }));
}
function initTrees(){
  bgTrees=[];
  // Couche lointaine (petits, sombres)
  for(let i=0;i<10;i++){
    bgTrees.push({
      x:i*(W/9)+Math.random()*40, y:H-GH,
      h:Math.round((55+Math.random()*40)*SC),
      r:Math.round((12+Math.random()*8)*SC),
      hue:160+Math.random()*20,
      sat:25, light:12,
      speed:0.5*SC, layer:0,
      type:Math.floor(Math.random()*2) // 0=conifère 1=rond
    });
  }
  // Couche intermédiaire
  for(let i=0;i<8;i++){
    bgTrees.push({
      x:i*(W/7)+Math.random()*50, y:H-GH,
      h:Math.round((70+Math.random()*50)*SC),
      r:Math.round((16+Math.random()*10)*SC),
      hue:140+Math.random()*30,
      sat:35, light:18,
      speed:0.9*SC, layer:1,
      type:Math.floor(Math.random()*2)
    });
  }
  // Couche proche (grands, plus lumineux)
  for(let i=0;i<6;i++){
    bgTrees.push({
      x:i*(W/5)+Math.random()*60, y:H-GH,
      h:Math.round((90+Math.random()*60)*SC),
      r:Math.round((20+Math.random()*14)*SC),
      hue:120+Math.random()*40,
      sat:45, light:22,
      speed:PS*0.75, layer:2,
      type:Math.floor(Math.random()*2)
    });
  }
}

// ══════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════
function spawnFeathers(x,y,n=6){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=2+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp*SC,vy:Math.sin(a)*sp*SC-2*SC,
      life:1,decay:0.04+Math.random()*0.02,
      r:2+Math.random()*3,
      col:['#ffe94a','#f97316','#fb923c','#fbbf24'][Math.floor(Math.random()*4)],
      rot:Math.random()*Math.PI*2,rspeed:(Math.random()-0.5)*0.3
    });
  }
}
function spawnDust(x,y){
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*1.5*SC,vy:Math.sin(a)*1.5*SC,
      life:1,decay:0.06,r:3+Math.random()*4,
      col:'rgba(255,255,255,0.3)',rot:0,rspeed:0
    });
  }
}
function spawnScorePop(x,y){
  particles.push({x,y:y-20*SC,vx:0,vy:-1.5*SC,life:1,decay:0.025,
    r:0,text:'+1',col:'#ffe94a',isText:true});
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vy+=0.1*SC*dt;
    p.life-=p.decay*dt;
    p.rot+=p.rspeed*dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=p.life;
    if(p.isText){
      ctx.font=`bold ${Math.round(14*SC)}px 'Fredoka One',cursive`;
      ctx.fillStyle=p.col;
      ctx.textAlign='center';
      ctx.fillText(p.text,p.x,p.y);
    } else {
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.ellipse(0,0,p.r*SC,p.r*0.5*SC,0,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

// ══════════════════════════════════════════
//  NETWORKING
// ══════════════════════════════════════════
function genCode(){return Math.random().toString(36).substr(2,5).toUpperCase();}
function setStatus(m){statusEl.textContent=m;}

function createPeer(id){
  if(peer){peer.destroy();}
  peer=new Peer(id,{debug:0});
  peer.on('error',e=>{setStatus('Erreur: '+e.type);});
}

btnCreate.addEventListener('click',()=>{
  myName=inpName.value.trim()||'Joueur 1';
  isHost=true;isSolo=false;
  const code=genCode();
  initSeed=Math.floor(Math.random()*99999);
  codeVal.textContent=code;
  codeBox.style.display='block';
  setStatus('En attente d\'un joueur...');
  createPeer('flappy-'+code);
  peer.on('open',()=>{
    peer.on('connection',c=>{
      conn=c;
      conn.on('open',()=>{
        setStatus('✅ Joueur 2 connecté !');
        conn.send({type:'init',name:myName,seed:initSeed});
      });
      conn.on('data',handleData);
      conn.on('close',()=>{setStatus('Joueur 2 déconnecté');ghost.alive=false;});
      setTimeout(()=>launchGame(),700);
    });
  });
});

btnJoin.addEventListener('click',()=>{
  const code=inpCode.value.trim().toUpperCase();
  if(!code){setStatus('Entre un code !');return;}
  myName=inpName.value.trim()||'Joueur 2';
  isHost=false;isSolo=false;
  setStatus('Connexion...');
  createPeer();
  peer.on('open',()=>{
    conn=peer.connect('flappy-'+code);
    conn.on('open',()=>{setStatus('Connecté !');});
    conn.on('data',handleData);
    conn.on('close',()=>{setStatus('Hôte déconnecté');ghost.alive=false;});
  });
});

function handleData(d){
  if(d.type==='init'){p2Name=d.name;initSeed=d.seed;if(!isHost)setTimeout(()=>launchGame(),700);}
  else if(d.type==='pos'){
    ghost.y=d.y*(H/d.H);ghost.rot=d.rot;ghost.ff=d.ff;
    ghost.alive=d.alive;ghost.score=d.score;
  }
  else if(d.type==='replay'){goscreen.classList.remove('show');launchGame();}
}

function sendPos(){
  if(conn&&conn.open)
    conn.send({type:'pos',y:bird.y,H,rot:bird.rot,ff:bird.ff,alive:state!=='dead',score});
}

// ══════════════════════════════════════════
//  LAUNCH / GAME FLOW
// ══════════════════════════════════════════
btnSolo.addEventListener('click',()=>{
  myName=inpName.value.trim()||'Joueur 1';
  isSolo=true;initSeed=Math.floor(Math.random()*99999);
  launchGame();
});

function launchGame(){
  seed=initSeed;
  state='ready';
  resetBird();resetGhost();
  pipes=[];particles=[];score=0;frame=0;ptimer=0;goff=0;
level=1;levelGoal=10;levelFlash=0;displayProgress=0;
  pipesPassedCount=0;sessionStart=Date.now();
  lobby.classList.add('hidden');
  document.getElementById('ver').style.display='none';
  goscreen.classList.remove('show');
  hud.style.display='block';
  slv.textContent='0';
  readyMsg.style.display='block';
  p2hud.textContent='';
  initClouds();initTrees();
}

function updateP2Hud(){
  if(isSolo){p2hud.textContent='';return;}
  p2hud.innerHTML=`👻 ${p2Name}<br>${ghost.alive?ghost.score:' 💀'}`;
}

function beginPlay(){
  if(state==='ready'){state='playing';readyMsg.style.display='none';flap();}
}
function flap(){
  if(state==='playing'){
    bird.vy=JP;bird.ff=0;bird.squish=0.6;
    spawnFeathers(Math.round(80*SC),bird.y);
  }
}

function spawn(){
  const mn=Math.round(60*SC),mx=H-GH-PG-Math.round(60*SC);
  pipes.push({x:W+10,t:mn+seededRand()*(mx-mn),s:false,wobble:0});
}

function hit(){
  const bx=Math.round(80*SC),r=Math.round(11*SC);
  if(bird.y+r>=H-GH){spawnDust(bx,H-GH);return true;}
  if(bird.y-r<=0) return true;
  for(const p of pipes){
    if(bx+r>p.x+6&&bx-r<p.x+PW-6){
      if(bird.y-r<p.t||bird.y+r>p.t+PG){
        spawnFeathers(bx,bird.y,12);screenShake=8;return true;
      }
    }
  }
  return false;
}

function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H-GH);
  g.addColorStop(0,'#08021a');
  g.addColorStop(0.3,'#120838');
  g.addColorStop(0.65,'#1a0f4a');
  g.addColorStop(0.85,'#0d1f3c');
  g.addColorStop(1,'#081428');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Lueur violette à l'horizon
  const glow=ctx.createLinearGradient(0,H*0.55,0,H-GH);
  glow.addColorStop(0,'rgba(60,20,120,0)');
  glow.addColorStop(1,'rgba(30,60,100,0.35)');
  ctx.fillStyle=glow;ctx.fillRect(0,H*0.55,W,H-GH);
}

function drawStars(f){
  for(let i=0;i<55;i++){
    const sx=(Math.sin(i*137.5)*0.5+0.5)*W;
    const sy=(Math.cos(i*97.3)*0.5+0.5)*(H*0.55);
    const a=0.3+0.5*Math.sin(f*0.04+i*0.8);
    const r=SC*(0.8+(i%3)*0.7);
    ctx.globalAlpha=a;
    ctx.fillStyle='#fffde0';
    ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Moon
  const mx=W*0.82,my=H*0.12;
  const mr=Math.round(22*SC);
  ctx.globalAlpha=0.9;
  ctx.fillStyle='#fef9c3';
  ctx.shadowColor='#fef08a';ctx.shadowBlur=Math.round(20*SC);
  ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // crater
  ctx.globalAlpha=0.15;ctx.fillStyle='#a16207';
  ctx.beginPath();ctx.arc(mx-mr*0.3,my-mr*0.2,mr*0.25,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(mx+mr*0.3,my+mr*0.1,mr*0.15,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
}

function drawClouds(f){
  clouds.forEach(c=>{
    if(state==='playing'){c.x-=c.speed; c.wobble+=0.008;}
    const wobY = Math.sin(c.wobble)*3*SC;
    const cx=c.x, cy=c.y+wobY, s=c.scale*SC;
    if(cx+120*s<0){c.x=W+80*s;c.y=20+Math.random()*(H*0.38);c.type=Math.floor(Math.random()*3);}

    ctx.save();
    ctx.globalAlpha=c.alpha;

    if(c.type===0){
      // Nuage bouffant — plusieurs cercles superposés
      const blobs=[
        {ox:-28*s,oy:8*s,r:14*s},
        {ox:-10*s,oy:0,r:20*s},
        {ox:10*s,oy:-4*s,r:17*s},
        {ox:28*s,oy:2*s,r:13*s},
        {ox:0,oy:10*s,r:10*s},
      ];
      // Ombre douce en dessous
      ctx.globalAlpha=c.alpha*0.3;
      blobs.forEach(b=>{
        ctx.fillStyle='#1a0a3a';
        ctx.beginPath();ctx.ellipse(cx+b.ox,cy+b.oy+10*s,b.r,b.r*0.4,0,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=c.alpha;
      // Corps du nuage avec dégradé
      blobs.forEach((b,i)=>{
        const g=ctx.createRadialGradient(cx+b.ox,cy+b.oy-b.r*0.3,b.r*0.1,cx+b.ox,cy+b.oy,b.r);
        g.addColorStop(0,'rgba(200,185,255,0.95)');
        g.addColorStop(0.5,'rgba(160,140,230,0.8)');
        g.addColorStop(1,'rgba(80,50,140,0.3)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.ellipse(cx+b.ox,cy+b.oy,b.r,b.r*0.65,0,0,Math.PI*2);ctx.fill();
      });
      // Reflet brillant sur le dessus
      ctx.globalAlpha=c.alpha*0.4;
      ctx.fillStyle='rgba(240,230,255,0.9)';
      ctx.beginPath();ctx.ellipse(cx-5*s,cy-8*s,14*s,7*s,-0.3,0,Math.PI*2);ctx.fill();

    } else if(c.type===1){
      // Nuage allongé — ellipse avec texture
      const w=50*s, h=16*s;
      const g=ctx.createRadialGradient(cx,cy-h*0.3,h*0.1,cx,cy,w*0.8);
      g.addColorStop(0,'rgba(190,170,255,0.85)');
      g.addColorStop(0.6,'rgba(120,100,200,0.6)');
      g.addColorStop(1,'rgba(60,30,120,0.1)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.ellipse(cx,cy,w,h,0,0,Math.PI*2);ctx.fill();
      // bumps sur le dessus
      [-20*s,0,20*s].forEach(ox=>{
        ctx.fillStyle='rgba(200,185,255,0.5)';
        ctx.beginPath();ctx.arc(cx+ox,cy-h*0.5,8*s,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=c.alpha*0.35;
      ctx.fillStyle='rgba(240,235,255,0.8)';
      ctx.beginPath();ctx.ellipse(cx-8*s,cy-h*0.6,12*s,5*s,-0.2,0,Math.PI*2);ctx.fill();

    } else {
      // Nuage vaporeux — filaments
      for(let k=0;k<5;k++){
        const ox=(k-2)*18*s, oy=Math.sin(k)*6*s;
        const g=ctx.createRadialGradient(cx+ox,cy+oy,0,cx+ox,cy+oy,16*s);
        g.addColorStop(0,'rgba(180,160,240,0.55)');
        g.addColorStop(1,'rgba(80,50,160,0.0)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.ellipse(cx+ox,cy+oy,16*s,9*s,k*0.2,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

function drawTrees(off,dt=1){
  // Trier par layer pour painter's algorithm
  const sorted=[...bgTrees].sort((a,b)=>a.layer-b.layer);
  sorted.forEach(t=>{
    if(state==='playing') t.x-=t.speed*dt;
    const maxX=t.x+t.r*2;
    if(maxX<0){
      t.x=W+t.r;
      t.h=Math.round((55+Math.random()*60+t.layer*30)*SC);
      t.r=Math.round((12+Math.random()*10+t.layer*6)*SC);
      t.hue=120+Math.random()*50;
    }
    const alpha=0.5+t.layer*0.2;
    ctx.save();
    ctx.globalAlpha=alpha;

    if(t.type===0){
      // ── Conifère (sapin) ──
      const tw=Math.round((4+t.layer)*SC);
      const tx=t.x, ty=t.y;
      const th=t.h;

      // Tronc
      const tg=ctx.createLinearGradient(tx-tw,ty,tx+tw,ty);
      tg.addColorStop(0,'#2a1a08'); tg.addColorStop(0.5,'#4a2e10'); tg.addColorStop(1,'#2a1a08');
      ctx.fillStyle=tg;
      ctx.beginPath();
      ctx.moveTo(tx-tw,ty);ctx.lineTo(tx+tw,ty);
      ctx.lineTo(tx+tw*0.6,ty-th*0.28);ctx.lineTo(tx-tw*0.6,ty-th*0.28);
      ctx.closePath();ctx.fill();

      // 4 niveaux de branches (triangles)
      const levels=4;
      for(let l=0;l<levels;l++){
        const progress=l/levels;
        const ly=ty-th*(0.22+progress*0.72);
        const lw=t.r*(1.1-progress*0.55);
        const overlap=th*0.12;

        // Ombre sous chaque niveau
        ctx.globalAlpha=alpha*0.25;
        ctx.fillStyle=`hsl(${t.hue},${t.sat}%,5%)`;
        ctx.beginPath();
        ctx.ellipse(tx,ly+overlap*0.5,lw*0.8,lw*0.18,0,0,Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=alpha;

        // Niveau de feuillage
        const lg=ctx.createLinearGradient(tx-lw,ly,tx+lw,ly);
        lg.addColorStop(0,`hsl(${t.hue},${t.sat}%,${t.light*0.7}%)`);
        lg.addColorStop(0.3,`hsl(${t.hue+10},${t.sat+10}%,${t.light+4}%)`);
        lg.addColorStop(0.7,`hsl(${t.hue},${t.sat}%,${t.light}%)`);
        lg.addColorStop(1,`hsl(${t.hue},${t.sat}%,${t.light*0.7}%)`);
        ctx.fillStyle=lg;
        ctx.beginPath();
        ctx.moveTo(tx,ly-overlap);
        ctx.lineTo(tx+lw,ly+overlap*1.5);
        ctx.lineTo(tx-lw,ly+overlap*1.5);
        ctx.closePath();ctx.fill();

        // Ligne de contour douce
        ctx.strokeStyle=`hsla(${t.hue},${t.sat}%,${t.light*0.4}%,0.5)`;
        ctx.lineWidth=Math.round(1*SC);
        ctx.stroke();

        // Reflet neige sur le dessus (si couche lointaine = plus froid)
        if(t.layer===0){
          ctx.globalAlpha=alpha*0.3;
          ctx.fillStyle='rgba(200,220,255,0.6)';
          ctx.beginPath();
          ctx.moveTo(tx,ly-overlap);
          ctx.lineTo(tx+lw*0.35,ly+overlap*0.3);
          ctx.lineTo(tx-lw*0.35,ly+overlap*0.3);
          ctx.closePath();ctx.fill();
          ctx.globalAlpha=alpha;
        }
      }
      // Pointe lumineuse au sommet
      ctx.fillStyle=`hsl(${t.hue+15},${t.sat+15}%,${t.light+8}%)`;
      ctx.beginPath();
      ctx.arc(tx,ty-th,Math.round(2.5*SC),0,Math.PI*2);ctx.fill();

    } else {
      // ── Arbre feuillu rond ──
      const tw=Math.round((3+t.layer)*SC);
      const tx=t.x, ty=t.y, th=t.h;

      // Tronc courbe
      ctx.strokeStyle=`hsl(25,${30+t.layer*5}%,${8+t.layer*3}%)`;
      ctx.lineWidth=tw*2;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(tx,ty);
      ctx.quadraticCurveTo(tx+tw*2,ty-th*0.5,tx+tw,ty-th);
      ctx.stroke();

      // Feuillage — plusieurs cercles
      const foliage=[
        {ox:0,oy:0,s:1},{ox:-t.r*0.35,oy:t.r*0.2,s:0.75},
        {ox:t.r*0.35,oy:t.r*0.15,s:0.7},{ox:0,oy:-t.r*0.3,s:0.6}
      ];
      foliage.forEach(({ox,oy,s:fs})=>{
        const fx=tx+tw+ox, fy=ty-th+oy;
        const fr=t.r*fs;
        const g=ctx.createRadialGradient(fx-fr*0.2,fy-fr*0.3,fr*0.05,fx,fy,fr);
        g.addColorStop(0,`hsl(${t.hue+10},${t.sat+15}%,${t.light+6}%)`);
        g.addColorStop(0.5,`hsl(${t.hue},${t.sat}%,${t.light}%)`);
        g.addColorStop(1,`hsl(${t.hue-10},${t.sat-5}%,${t.light*0.6}%)`);
        ctx.fillStyle=g;
        // Ellipse aplatie au lieu de cercle parfait
        ctx.beginPath();ctx.ellipse(fx,fy,fr,fr*0.72,0,0,Math.PI*2);ctx.fill();
      });

      // Reflet sur le dessus
      ctx.globalAlpha=alpha*0.25;
      ctx.fillStyle=`hsl(${t.hue+20},80%,${t.light+20}%)`;
      ctx.beginPath();ctx.ellipse(tx+tw-t.r*0.15,ty-th-t.r*0.25,t.r*0.35,t.r*0.2,-0.3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=alpha;
    }
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

function drawPipe(x,t){
  const by=t+PG,bh=H-GH-by;
  const rnd=Math.round(8*SC);

  // drop shadow
  ctx.globalAlpha=0.2;
  ctx.fillStyle='#000';
  ctx.fillRect(x+Math.round(6*SC),0,PW,t);
  ctx.fillRect(x+Math.round(6*SC),by,PW,bh);
  ctx.globalAlpha=1;

  // pipe body gradient
  const g=ctx.createLinearGradient(x,0,x+PW,0);
  g.addColorStop(0,'#15803d');
  g.addColorStop(0.25,'#4ade80');
  g.addColorStop(0.5,'#22c55e');
  g.addColorStop(0.75,'#16a34a');
  g.addColorStop(1,'#14532d');
  ctx.fillStyle=g;
  ctx.fillRect(x,0,PW,t);
  ctx.fillRect(x,by,PW,bh);

  // Cartoon outline
  ctx.strokeStyle='rgba(0,0,0,0.25)';
  ctx.lineWidth=Math.round(2*SC);
  ctx.strokeRect(x,0,PW,t);
  ctx.strokeRect(x,by,PW,bh);

  // Cap gradient
  const cg=ctx.createLinearGradient(x-6,0,x+PW+6,0);
  cg.addColorStop(0,'#166534');
  cg.addColorStop(0.2,'#86efac');
  cg.addColorStop(0.5,'#4ade80');
  cg.addColorStop(0.8,'#22c55e');
  cg.addColorStop(1,'#14532d');
  ctx.fillStyle=cg;
  const ch=Math.round(22*SC),cx=x-Math.round(6*SC),cw=PW+Math.round(12*SC);
  ctx.beginPath();ctx.roundRect(cx,t-ch,cw,ch,[0,0,rnd,rnd]);ctx.fill();
  ctx.beginPath();ctx.roundRect(cx,by,cw,ch,[rnd,rnd,0,0]);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.roundRect(cx,t-ch,cw,ch,[0,0,rnd,rnd]);ctx.stroke();
  ctx.beginPath();ctx.roundRect(cx,by,cw,ch,[rnd,rnd,0,0]);ctx.stroke();

  // shine
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(x+Math.round(7*SC),0,Math.round(6*SC),t-ch);
  ctx.fillRect(x+Math.round(7*SC),by+ch,Math.round(6*SC),bh-ch);
}


function spawnLevelUp(x,y){
  const colsByLevel=[
    ['#ffff00','#ffe200','#fbbf24','#fff'],  // jaune
    ['#fed7aa','#f97316','#ea580c','#fff'],  // orange
    ['#fca5a5','#ef4444','#dc2626','#fff'],  // rouge
    ['#ede9fe','#a78bfa','#7c3aed','#fff'],  // violet
    ['#ffffff','#e0f2fe','#bae6fd','#fff'],  // blanc
    ['#ffffff','#fef08a','#60a5fa','#fff'],  // DBZ
  ];
  const cols=colsByLevel[Math.min(level-1,colsByLevel.length-1)];
  for(let i=0;i<25;i++){
    const a=Math.random()*Math.PI*2,sp=(3+Math.random()*5)*SC;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3*SC,
      life:1,decay:0.02,r:2+Math.random()*4,
      col:cols[Math.floor(Math.random()*cols.length)],
      rot:0,rspeed:(Math.random()-0.5)*0.4
    });
  }
}

function drawGround(off,dt=1){
  const barH=Math.round(10*SC);
  const barY=H-barH-Math.round(6*SC);

  // Calcul progression cible
  const prevGoal=level===1?0:levelGoal/2;
  const levelRange=levelGoal-prevGoal;
  const targetProgress=Math.min(1,(score-prevGoal)/levelRange);

  // Smooth interpolation
  displayProgress+=(targetProgress-displayProgress)*0.08*dt;

  // Fond sombre de la barre
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,barY,W,barH);

  // Fill smooth
  const hue=levelFlash>0?55:(130-level*10);
  const fillW=Math.max(1,W*displayProgress);
  const fg=ctx.createLinearGradient(0,0,W,0);
  if(levelFlash>0){
    fg.addColorStop(0,'#ffe94a');fg.addColorStop(0.5,'#fff');fg.addColorStop(1,'#ffe94a');
  } else {
    fg.addColorStop(0,`hsl(${hue+20},90%,45%)`);
    fg.addColorStop(0.7,`hsl(${hue},85%,55%)`);
    fg.addColorStop(1,`hsl(${hue-20},80%,40%)`);
  }
  ctx.fillStyle=fg;
  ctx.fillRect(0,barY,fillW,barH);

  // Shine
  const shine=ctx.createLinearGradient(0,barY,0,barY+barH);
  shine.addColorStop(0,'rgba(255,255,255,0.3)');shine.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=shine;
  ctx.fillRect(0,barY,fillW,barH);

  // Textes
  ctx.save();
  ctx.font=`bold ${Math.round(8*SC)}px 'Fredoka One',cursive`;
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.textAlign='left';
  ctx.fillText('NV '+level, Math.round(8*SC), barY+barH/2);
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.textAlign='right';
  ctx.fillText(Math.min(score,levelGoal)+' / '+levelGoal, W-Math.round(8*SC), barY+barH/2);
  ctx.restore();

  // Flash level up
  if(levelFlash>0){
    ctx.save();
    ctx.globalAlpha=levelFlash/30;
    ctx.font=`bold ${Math.round(11*SC)}px 'Fredoka One',cursive`;
    ctx.fillStyle='#ffe94a';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✨ NIVEAU '+level, W/2, barY+barH/2);
    ctx.restore();
    levelFlash=Math.max(0,levelFlash-1);
  }
}

    {c0:'#fed7aa',c1:'#f97316',c2:'#ea580c',c3:'#9a3412',wing0:'#f97316',wing1:'#9a3412',shadow:'#ea580caa',outline:'rgba(100,30,0,0.5)'},  // orange
    {c0:'#fca5a5',c1:'#ef4444',c2:'#dc2626',c3:'#991b1b',wing0:'#ef4444',wing1:'#991b1b',shadow:'#ef4444aa',outline:'rgba(120,0,0,0.5)'},   // rouge
    {c0:'#ede9fe',c1:'#a78bfa',c2:'#7c3aed',c3:'#4c1d95',wing0:'#a78bfa',wing1:'#4c1d95',shadow:'#a78bfaaa',outline:'rgba(60,0,120,0.5)'}, // violet
    {c0:'#ffffff',c1:'#f0f9ff',c2:'#e0f2fe',c3:'#bae6fd',wing0:'#ffffff',wing1:'#bae6fd',shadow:'#ffffffcc',outline:'rgba(180,220,255,0.7)'}, // blanc pétant

function drawAura(b){
  const bx=Math.round(80*SC);
  const t=frame;
  ctx.save();

  if(level>=6){
    // ══ AURA DBZ ══
    // Spike electrique jaune/doré autour du corps
    const spikes=12;
    for(let s=0;s<spikes;s++){
      const baseAngle=(s/spikes)*Math.PI*2;
      const wobble=Math.sin(t*0.3+s*1.3)*0.25;
      const angle=baseAngle+wobble;
      const len=(30+Math.sin(t*0.2+s*0.9)*14+Math.random()*8)*SC;
      const w=(6+Math.sin(t*0.15+s)*3)*SC;

      const gSpike=ctx.createLinearGradient(
        bx+Math.cos(angle)*8*SC, b.y+Math.sin(angle)*8*SC,
        bx+Math.cos(angle)*len, b.y+Math.sin(angle)*len
      );
      gSpike.addColorStop(0,'rgba(255,255,180,0.9)');
      gSpike.addColorStop(0.4,'rgba(255,220,50,0.6)');
      gSpike.addColorStop(1,'rgba(255,150,0,0)');

      ctx.save();
      ctx.translate(bx,b.y);ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(8*SC,-w/2);
      ctx.lineTo(len,0);
      ctx.lineTo(8*SC,w/2);
      ctx.closePath();
      ctx.fillStyle=gSpike;
      ctx.fill();
      ctx.restore();
    }

    // Halo doré pulsant
    const r1=(28+Math.sin(t*0.25)*6)*SC;
    const halo=ctx.createRadialGradient(bx,b.y,10*SC,bx,b.y,r1);
    halo.addColorStop(0,'rgba(255,230,50,0.35)');
    halo.addColorStop(0.5,'rgba(255,180,0,0.2)');
    halo.addColorStop(1,'rgba(255,100,0,0)');
    ctx.beginPath();ctx.arc(bx,b.y,r1,0,Math.PI*2);
    ctx.fillStyle=halo;ctx.fill();

    // Eclairs électriques
    for(let e=0;e<3;e++){
      const ea=Math.random()*Math.PI*2;
      const er=(20+Math.random()*15)*SC;
      const ex=bx+Math.cos(ea)*er, ey=b.y+Math.sin(ea)*er;
      ctx.strokeStyle=`rgba(255,255,100,${0.4+Math.random()*0.5})`;
      ctx.lineWidth=Math.round(1.5*SC);
      ctx.beginPath();
      ctx.moveTo(bx,b.y);
      ctx.lineTo(ex+Math.random()*10*SC-5*SC, ey+Math.random()*10*SC-5*SC);
      ctx.lineTo(ex,ey);
      ctx.stroke();
    }

    // Aura bleue externe (comme SSB)
    const outerR=(38+Math.sin(t*0.18)*8)*SC;
    const outerH=ctx.createRadialGradient(bx,b.y,15*SC,bx,b.y,outerR);
    outerH.addColorStop(0,'rgba(120,200,255,0.15)');
    outerH.addColorStop(1,'rgba(50,100,255,0)');
    ctx.beginPath();ctx.arc(bx,b.y,outerR,0,Math.PI*2);
    ctx.fillStyle=outerH;ctx.fill();

  } else if(level>=5){
    // ══ AURA BLANCHE niveau 5 ══
    const r=(26+Math.sin(t*0.2)*5)*SC;
    const glow=ctx.createRadialGradient(bx,b.y,8*SC,bx,b.y,r);
    glow.addColorStop(0,'rgba(255,255,255,0.55)');
    glow.addColorStop(0.5,'rgba(200,230,255,0.25)');
    glow.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(bx,b.y,r,0,Math.PI*2);
    ctx.fillStyle=glow;ctx.fill();

    // Petites étincelles blanches
    for(let i=0;i<4;i++){
      const sa=Math.random()*Math.PI*2;
      const sr=(18+Math.random()*12)*SC;
      ctx.globalAlpha=Math.random()*0.7;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(bx+Math.cos(sa)*sr,b.y+Math.sin(sa)*sr,Math.round(1.5*SC),0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

function drawBirdBody(b,isGhost){
  const bx=Math.round(80*SC);
  const rw=Math.round(20*SC),rh=Math.round(15*SC);
  const sq=b.squish||1;

  ctx.save();
  ctx.translate(bx,b.y);
  ctx.rotate(b.rot);
  ctx.scale(2-sq,sq); // squish/stretch

  if(isGhost){
    ctx.globalAlpha=0.5;
    ctx.shadowColor='#a78bfa';ctx.shadowBlur=Math.round(20*SC);
    // body
    const bg=ctx.createRadialGradient(-Math.round(4*SC),-Math.round(4*SC),2,0,0,rw);
    bg.addColorStop(0,'#ede9fe');bg.addColorStop(0.5,'#a78bfa');bg.addColorStop(1,'#6d28d9');
    ctx.fillStyle=bg;
    ctx.strokeStyle='rgba(109,40,217,0.5)';ctx.lineWidth=Math.round(2*SC);
    ctx.beginPath();ctx.ellipse(0,0,rw,rh,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    // wing
    ctx.save();ctx.rotate(Math.sin(b.ff*0.55)*0.7);
    ctx.fillStyle='#c4b5fd';ctx.strokeStyle='rgba(109,40,217,0.3)';ctx.lineWidth=Math.round(1.5*SC);
    ctx.beginPath();ctx.ellipse(-Math.round(4*SC),Math.round(5*SC),Math.round(12*SC),Math.round(7*SC),-0.3,0,Math.PI*2);
    ctx.fill();ctx.stroke();ctx.restore();
    // eye
    ctx.globalAlpha=0.8;
    ctx.fillStyle='white';ctx.beginPath();ctx.ellipse(Math.round(7*SC),-Math.round(5*SC),Math.round(7*SC),Math.round(7*SC),0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4c1d95';ctx.beginPath();ctx.ellipse(Math.round(9*SC),-Math.round(5*SC),Math.round(4*SC),Math.round(4*SC),0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.5;
  } else {
    // Cartoon shadow under bird
    ctx.globalAlpha=0.18;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(0,rh+Math.round(4*SC),rw*0.8,Math.round(5*SC),0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    const bc=getBirdColors();
    ctx.shadowColor=bc.shadow;ctx.shadowBlur=Math.round(16*SC);
    // body gradient
    const bg=ctx.createRadialGradient(-Math.round(4*SC),-Math.round(5*SC),2,0,0,rw);
    bg.addColorStop(0,bc.c0);bg.addColorStop(0.4,bc.c1);bg.addColorStop(0.75,bc.c2);bg.addColorStop(1,bc.c3);
    ctx.fillStyle=bg;
    ctx.strokeStyle=bc.outline;ctx.lineWidth=Math.round(2.5*SC);
    ctx.beginPath();ctx.ellipse(0,0,rw,rh,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;

    // belly spot
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.ellipse(Math.round(3*SC),Math.round(3*SC),Math.round(8*SC),Math.round(6*SC),0.2,0,Math.PI*2);ctx.fill();

    // wing
    const wa=Math.sin(b.ff*0.55)*0.7;
    ctx.save();ctx.rotate(wa);
    const wg=ctx.createRadialGradient(-Math.round(4*SC),Math.round(4*SC),1,-Math.round(4*SC),Math.round(4*SC),Math.round(14*SC));
    wg.addColorStop(0,bc.wing0);wg.addColorStop(1,bc.wing1);
    ctx.fillStyle=wg;
    ctx.strokeStyle='rgba(120,40,0,0.4)';ctx.lineWidth=Math.round(1.5*SC);
    ctx.beginPath();ctx.ellipse(-Math.round(4*SC),Math.round(5*SC),Math.round(12*SC),Math.round(7*SC),-0.3,0,Math.PI*2);
    ctx.fill();ctx.stroke();ctx.restore();

    // eye white
    ctx.fillStyle='white';
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=Math.round(1.5*SC);
    ctx.beginPath();ctx.ellipse(Math.round(7*SC),-Math.round(5*SC),Math.round(7*SC),Math.round(7*SC),0,0,Math.PI*2);ctx.fill();ctx.stroke();
    // iris
    ctx.fillStyle='#1e1b4b';
    ctx.beginPath();ctx.ellipse(Math.round(9*SC),-Math.round(5*SC),Math.round(4.5*SC),Math.round(4.5*SC),0,0,Math.PI*2);ctx.fill();
    // pupil
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(Math.round(10*SC),-Math.round(5.5*SC),Math.round(2.5*SC),Math.round(2.5*SC),0,0,Math.PI*2);ctx.fill();
    // gleam
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(Math.round(11.5*SC),-Math.round(7*SC),Math.round(1.5*SC),0,Math.PI*2);ctx.fill();
    // tiny gleam
    ctx.beginPath();ctx.arc(Math.round(9*SC),-Math.round(3.5*SC),Math.round(0.8*SC),0,Math.PI*2);ctx.fill();

    // beak (cartoon wide)
    ctx.fillStyle='#f59e0b';
    ctx.strokeStyle='rgba(120,60,0,0.5)';ctx.lineWidth=Math.round(1.5*SC);
    ctx.beginPath();
    ctx.moveTo(Math.round(14*SC),-Math.round(3*SC));
    ctx.lineTo(Math.round(27*SC),Math.round(0*SC));
    ctx.lineTo(Math.round(14*SC),Math.round(5*SC));
    ctx.closePath();ctx.fill();ctx.stroke();
    // beak line
    ctx.strokeStyle='rgba(120,60,0,0.3)';ctx.lineWidth=Math.round(1*SC);
    ctx.beginPath();ctx.moveTo(Math.round(14*SC),Math.round(1*SC));ctx.lineTo(Math.round(27*SC),0);ctx.stroke();

    // cheek blush
    ctx.globalAlpha=0.35;ctx.fillStyle='#f87171';
    ctx.beginPath();ctx.ellipse(Math.round(5*SC),Math.round(3*SC),Math.round(5*SC),Math.round(3*SC),0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();

  // Name tag with bubble
  if(state==='playing'||state==='ready'){
    const name=isGhost?p2Name:myName;
    ctx.save();
    ctx.font=`bold ${Math.round(10*SC)}px 'Fredoka One',cursive`;
    ctx.textAlign='center';
    const tw2=ctx.measureText(name).width;
    const tx=bx,ty=b.y-Math.round(28*SC);
    // bubble
    ctx.globalAlpha=isGhost?0.6:0.8;
    ctx.fillStyle=isGhost?'rgba(109,40,217,0.7)':'rgba(0,0,0,0.5)';
    ctx.beginPath();ctx.roundRect(tx-tw2/2-6,ty-12,tw2+12,16,[6]);ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle=isGhost?'#c4b5fd':'#ffe94a';
    ctx.fillText(name,tx,ty);
    ctx.restore();
  }
}

function drawTrail(b){
  if(b.trail&&b.trail.length>1){
    ctx.save();
    for(let i=1;i<b.trail.length;i++){
      const a=(i/b.trail.length)*0.25;
      ctx.globalAlpha=a;
      ctx.fillStyle='#fbbf24';
      ctx.beginPath();
      ctx.arc(b.trail[i].x,b.trail[i].y,Math.round((8-(i*0.5))*SC)*0.4,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha=1;
  }
}

// ══════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════
let lastTime=0;
const TARGET_FPS=60;

function loop(ts){
  requestAnimationFrame(loop);
  const dt=lastTime?Math.min((ts-lastTime)/1000*TARGET_FPS,3):1;
  lastTime=ts;
  frame+=dt;

  // Screen shake
  let sx=0,sy=0;
  if(screenShake>0){
    sx=(Math.random()-0.5)*screenShake;
    sy=(Math.random()-0.5)*screenShake;
    screenShake=Math.max(0,screenShake-0.8*dt);
    ctx.save();ctx.translate(sx,sy);
  }

  drawSky();
  drawStars(frame);
  drawClouds(frame);
  drawTrees(goff,dt);

  if(state==='playing'){
    goff=(goff+PS*dt)%(Math.round(38*SC)*2);
    bird.vy+=GR*dt; bird.y+=bird.vy*dt; bird.ff+=dt;
    bird.rot=Math.min(Math.PI/2.5,Math.max(-Math.PI/5,bird.vy*0.065));
    bird.squish=Math.min(1,bird.squish+0.08*dt);

    // trail
    bird.trail=bird.trail||[];
    bird.trail.unshift({x:Math.round(80*SC),y:bird.y});
    if(bird.trail.length>8) bird.trail.pop();

    ptimer+=dt;
    if(ptimer>=75){spawn();ptimer=0;}
    pipes.forEach(p=>{
      p.x-=PS*dt;
      if(!p.s&&p.x+PW<Math.round(80*SC)){
        p.s=true;score++;pipesPassedCount++;
        slv.textContent=score;
        spawnScorePop(Math.round(80*SC),bird.y-30*SC);
        if(score>=levelGoal){level++;levelGoal*=2;levelFlash=30;displayProgress=0;spawnLevelUp(Math.round(80*SC),bird.y);}
      }
    });
    pipes=pipes.filter(p=>p.x+PW>-10);
    sendPos();
    if(!isSolo) updateP2Hud();
    if(hit()) die();
  } else if(state==='ready'){
    bird.y=H/2+Math.sin(frame*0.05)*Math.round(9*SC);
    bird.ff+=dt;
  } else if(state==='lobby'){
    resetBird&&(bird=bird||{y:H/2,vy:0,rot:0,ff:0,squish:1,trail:[]});
    bird.y=H/2+Math.sin(frame*0.04)*Math.round(12*SC);
    bird.ff+=dt;
  }

  pipes.forEach(p=>drawPipe(p.x,p.t));
  drawGround(goff,dt);

  drawTrail(bird);
  if(!isSolo&&ghost.alive) drawBirdBody(ghost,true);
  if(state!=='lobby'){
    if(level>=5) drawAura(bird);
    drawBirdBody(bird,false);
  }

  updateParticles(dt);

  if(screenShake>0) ctx.restore();
}

resetBird();
loop();
})();
</script>
